<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Zero Foundation resets ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CEE6E8; border-radius: 2px; }

    body {
      font-family: 'Lexend', system-ui, sans-serif;
      background: #F2F5F5;
      color: #323743;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Layout ── */
    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 40px;
      letter-spacing: -0.4px;
      color: #13151A;
    }
    .header p {
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #2D949E;
      margin-top: 4px;
    }

    /* ── Score card ── */
    .scores {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: stretch;
    }
    .score-card {
      background: #FFFFFF;
      border: 1px solid #DEE1E7;
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
    }
    .score-card.active-player {
      background: #E9F4F5;
      border-color: #CEE6E8;
    }
    .score-label {
      font-size: 11px;
      font-weight: 500;
      line-height: 16px;
      letter-spacing: 0.04em;
      color: #2D949E;
      text-transform: uppercase;
    }
    .score-name {
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
      color: #13151A;
      margin-top: 2px;
    }
    .score-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 36px;
      letter-spacing: -0.4px;
      color: #03727D;
      margin-top: 4px;
    }
    .score-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .score-divider .draws-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #2D949E;
      text-transform: uppercase;
    }
    .score-divider .draws-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 28px;
      color: #444C5D;
    }
    .score-divider .vs {
      font-size: 12px;
      font-weight: 400;
      color: #6BB3BA;
    }

    /* ── Status banner ── */
    .status {
      background: #FFFFFF;
      border: 1px solid #DEE1E7;
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
      color: #323743;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .status.winner {
      background: #E9F4F5;
      border-color: #CEE6E8;
      color: #03727D;
    }
    .status.draw {
      background: #F2F5F5;
      border-color: #DEE1E7;
      color: #444C5D;
    }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .cell {
      aspect-ratio: 1;
      background: #FFFFFF;
      border: 1px solid #DEE1E7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      color: #03727D;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .cell:hover:not(.filled):not(.game-over) {
      background: #E9F4F5;
      border-color: #CEE6E8;
    }
    .cell:active:not(.filled):not(.game-over) {
      transform: scale(0.96);
    }
    .cell:focus-visible {
      outline: 3px solid rgba(45, 148, 158, 0.2);
      border-color: #03727D;
    }
    .cell.filled {
      cursor: default;
    }
    .cell.winner-cell {
      background: #E9F4F5;
      border-color: #CEE6E8;
    }
    .cell.x-cell { color: #03727D; }
    .cell.o-cell { color: #013D43; }

    /* ── Buttons ── */
    .btn-primary {
      height: 44px;
      border-radius: 8px;
      border: none;
      background: #03727D;
      color: #FFFFFF;
      font-family: 'Lexend', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
      cursor: pointer;
      width: 100%;
      transition: background 0.12s ease;
    }
    .btn-primary:hover { background: #02545D; }
    .btn-primary:active { background: #013D43; }
    .btn-primary:focus-visible {
      outline: 3px solid rgba(45, 148, 158, 0.2);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <h1>⚔️ Tic Tac Toe</h1>
    <p>Hero vs. Villain — may the best adventurer win</p>
  </header>

  <!-- Scores -->
  <div class="scores">
    <div class="score-card" id="hero-card">
      <div class="score-label">Hero (X)</div>
      <div class="score-name">⚔️ Paladin</div>
      <div class="score-value" id="hero-score">0</div>
    </div>
    <div class="score-divider">
      <div class="draws-label">Draws</div>
      <div class="draws-value" id="draws-score">0</div>
      <div class="vs">vs</div>
    </div>
    <div class="score-card" id="villain-card">
      <div class="score-label">Villain (O)</div>
      <div class="score-name">💀 Lich</div>
      <div class="score-value" id="villain-score">0</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status">⚔️ Paladin's turn</div>

  <!-- Board -->
  <div class="board" id="board">
    <button class="cell" data-index="0" tabindex="0"></button>
    <button class="cell" data-index="1" tabindex="0"></button>
    <button class="cell" data-index="2" tabindex="0"></button>
    <button class="cell" data-index="3" tabindex="0"></button>
    <button class="cell" data-index="4" tabindex="0"></button>
    <button class="cell" data-index="5" tabindex="0"></button>
    <button class="cell" data-index="6" tabindex="0"></button>
    <button class="cell" data-index="7" tabindex="0"></button>
    <button class="cell" data-index="8" tabindex="0"></button>
  </div>

  <!-- Restart -->
  <button class="btn-primary" id="restart-btn">New Round</button>

</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6],         // diagonals
  ];

  const players = {
    X: { label: "⚔️ Paladin", symbol: "⚔️", cssClass: "x-cell", cardId: "hero-card",    scoreId: "hero-score"    },
    O: { label: "💀 Lich",    symbol: "💀", cssClass: "o-cell", cardId: "villain-card", scoreId: "villain-score" },
  };

  let board      = Array(9).fill(null);
  let current    = "X";
  let gameOver   = false;
  let scores     = { X: 0, O: 0, draw: 0 };

  const cells      = [...document.querySelectorAll(".cell")];
  const statusEl   = document.getElementById("status");
  const restartBtn = document.getElementById("restart-btn");

  function checkWinner(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(Boolean)) return { winner: null, draw: true };
    return null;
  }

  function updateActiveCard() {
    document.getElementById("hero-card").classList.toggle("active-player", current === "X" && !gameOver);
    document.getElementById("villain-card").classList.toggle("active-player", current === "O" && !gameOver);
  }

  function render() {
    cells.forEach((cell, i) => {
      const val = board[i];
      cell.textContent = val ? players[val].symbol : "";
      cell.className = "cell" + (val ? " filled " + players[val].cssClass : "") + (gameOver ? " game-over" : "");
    });
    document.getElementById("hero-score").textContent    = scores.X;
    document.getElementById("villain-score").textContent = scores.O;
    document.getElementById("draws-score").textContent   = scores.draw;
    updateActiveCard();
  }

  function handleClick(index) {
    if (gameOver || board[index]) return;

    board[index] = current;
    const result = checkWinner(board);

    if (result) {
      gameOver = true;
      if (result.draw) {
        scores.draw++;
        statusEl.textContent = "🤝 A draw — honour among adventurers!";
        statusEl.className = "status draw";
      } else {
        scores[result.winner]++;
        result.line.forEach(i => cells[i].classList.add("winner-cell"));
        statusEl.textContent = `${players[result.winner].label} wins the battle!`;
        statusEl.className = "status winner";
      }
      // remove active-player highlight
      document.getElementById("hero-card").classList.remove("active-player");
      document.getElementById("villain-card").classList.remove("active-player");
    } else {
      current = current === "X" ? "O" : "X";
      statusEl.textContent = `${players[current].label}'s turn`;
      statusEl.className = "status";
    }

    render();
  }

  function restart() {
    board    = Array(9).fill(null);
    current  = "X";
    gameOver = false;
    statusEl.textContent = `${players[current].label}'s turn`;
    statusEl.className = "status";
    render();
  }

  cells.forEach(cell => {
    cell.addEventListener("click", () => handleClick(Number(cell.dataset.index)));
  });
  restartBtn.addEventListener("click", restart);

  render();
</script>
</body>
</html>
